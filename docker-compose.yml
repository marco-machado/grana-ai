services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d finance"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    depends_on:
      postgres:
        condition: service_healthy

  metabase:
    image: metabase/metabase:latest
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
    volumes:
      - metabase_data:/metabase-data
    ports:
      - "${METABASE_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "echo '[1/4] Pushing database schema...' &&
             npx prisma db push --schema=./prisma/schema.prisma --skip-generate &&
             echo '[2/4] Creating partial indexes...' &&
             echo 'CREATE UNIQUE INDEX IF NOT EXISTS \"Category_name_root_unique\" ON \"Category\" (name) WHERE parent_id IS NULL;' | npx prisma db execute --stdin --schema=./prisma/schema.prisma &&
             echo '[3/4] Seeding database...' &&
             npx prisma db seed &&
             echo '[4/4] Starting server...' &&
             node server.js"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finance
      - METABASE_URL=http://metabase:3000
      - METABASE_SECRET_KEY=${METABASE_SECRET_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./app/app
          target: /app/app
          ignore:
            - node_modules/
            - .next/
        - action: sync
          path: ./app/components
          target: /app/components
        - action: sync
          path: ./app/lib
          target: /app/lib
        - action: rebuild
          path: ./app/package.json

volumes:
  postgres_data:
  n8n_data:
  metabase_data:
